title: "book notes and commonplaces"
author: "jboydt"
description: ""
url: "http://jboydt.github.io"

lang: en
timezone: UTC

remote_theme: yous/whiteglass
plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap

permalink: /:year/:month/:day/:title/
paginate_path: /posts/:num/
paginate: 5

jekyll-archives:
  enabled:
    - categories
    - tags
  layout: category_archives
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
